<h2 mat-dialog-title>Detalle de bitácora</h2>
<mat-dialog-content>
  <p><strong>Colección:</strong> {{ bitacora.coleccion }}</p>
  <p><strong>Acción:</strong> {{ bitacora.accion }}</p>
  <p><strong>Usuario:</strong> {{ bitacora.usuario?.nombre || 'Sistema' }}</p>

  <table mat-table [dataSource]="filas" class="list-table">
    <ng-container matColumnDef="campo">
      <th mat-header-cell *matHeaderCellDef>Campo</th>
      <td mat-cell *matCellDef="let fila">{{ fila.campo }}</td>
    </ng-container>

    <ng-container matColumnDef="anterior">
      <th mat-header-cell *matHeaderCellDef>Anterior</th>
      <td mat-cell *matCellDef="let fila" [class.diff-cambio]="fila.cambio">{{ fila.anterior }}</td>
    </ng-container>

    <ng-container matColumnDef="nuevo">
      <th mat-header-cell *matHeaderCellDef>Actual</th>
      <td mat-cell *matCellDef="let fila" [class.diff-cambio]="fila.cambio">{{ fila.nuevo }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columnasDiff"></tr>
    <tr mat-row *matRowDef="let row; columns: columnasDiff"></tr>
  </table>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-flat-button color="primary" (click)="dialogRef.close()">Cerrar</button>
</mat-dialog-actions>
