<div class="auth-page">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Recuperar contraseña</mat-card-title>
      <mat-card-subtitle>Te enviaremos nuevas credenciales a tu correo</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        <mat-form-field appearance="outline">
          <mat-label>Usuario (correo)</mat-label>
          <input matInput type="email" formControlName="usuario" autocomplete="username" />
          @if (form.controls.usuario.invalid && form.controls.usuario.touched) {
            <mat-error>Ingresa un correo válido.</mat-error>
          }
        </mat-form-field>

        @if (mensaje()) {
          <p class="auth-success">{{ mensaje() }}</p>
        }

        @if (error()) {
          <p class="auth-error">{{ error() }}</p>
        }

        <button mat-flat-button color="primary" type="submit" [disabled]="cargando()" class="auth-submit">
          @if (cargando()) {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            Enviar nuevas credenciales
          }
        </button>

        <a routerLink="/login" class="auth-link">Volver a iniciar sesión</a>
      </form>
    </mat-card-content>
  </mat-card>
</div>
