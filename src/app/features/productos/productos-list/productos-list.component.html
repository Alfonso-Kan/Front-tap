<div class="list-header">
  <h1>Productos</h1>
  <div class="list-actions">
    <button mat-stroked-button (click)="exportarPdf()" [disabled]="exportandoPdf()">
      @if (exportandoPdf()) {
        <mat-spinner diameter="18"></mat-spinner>
      } @else {
        <mat-icon>picture_as_pdf</mat-icon>
      }
      PDF
    </button>
    <button mat-stroked-button (click)="exportarExcel()" [disabled]="exportandoExcel()">
      @if (exportandoExcel()) {
        <mat-spinner diameter="18"></mat-spinner>
      } @else {
        <mat-icon>grid_on</mat-icon>
      }
      Excel
    </button>
    <button mat-flat-button color="primary" (click)="abrirCrear()">
      <mat-icon>add</mat-icon>
      Nuevo producto
    </button>
  </div>
</div>

@if (cargando()) {
  <div class="list-loading"><mat-spinner diameter="32"></mat-spinner></div>
} @else {
  <table mat-table [dataSource]="productos()" class="list-table">
    <ng-container matColumnDef="codigo">
      <th mat-header-cell *matHeaderCellDef>Código</th>
      <td mat-cell *matCellDef="let producto">{{ producto.codigo }}</td>
    </ng-container>

    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let producto">{{ producto.nombre }}</td>
    </ng-container>

    <ng-container matColumnDef="precio">
      <th mat-header-cell *matHeaderCellDef>Precio</th>
      <td mat-cell *matCellDef="let producto">{{ producto.precio | number: '1.2-2' }}</td>
    </ng-container>

    <ng-container matColumnDef="fecha_creacion">
      <th mat-header-cell *matHeaderCellDef>Fecha de creación</th>
      <td mat-cell *matCellDef="let producto">{{ producto.fecha_creacion | date: 'dd/MM/yyyy HH:mm' }}</td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let producto">
        <button mat-icon-button (click)="abrirEditar(producto)" matTooltip="Editar">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button (click)="eliminar(producto)" matTooltip="Eliminar">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columnas"></tr>
    <tr mat-row *matRowDef="let row; columns: columnas"></tr>
  </table>

  @if (productos().length === 0) {
    <p class="list-empty">No hay productos registrados.</p>
  }
}
