<h2 mat-dialog-title>{{ esEdicion ? 'Editar sección' : 'Nueva sección' }}</h2>
<form [formGroup]="form" (ngSubmit)="guardar()">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Código</mat-label>
      <input matInput formControlName="codigo" [readonly]="esEdicion" />
      @if (form.controls.codigo.invalid && form.controls.codigo.touched) {
        <mat-error>El código es requerido.</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre" />
      @if (form.controls.nombre.invalid && form.controls.nombre.touched) {
        <mat-error>El nombre es requerido.</mat-error>
      }
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancelar()">Cancelar</button>
    <button mat-flat-button color="primary" type="submit">Guardar</button>
  </mat-dialog-actions>
</form>
