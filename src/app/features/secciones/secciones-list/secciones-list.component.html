<div class="list-header">
  <h1>Secciones</h1>
</div>

<p class="list-hint">
  Las secciones son las 5 pantallas fijas del sistema; solo se puede editar el nombre que se muestra.
</p>

@if (cargando()) {
  <div class="list-loading"><mat-spinner diameter="32"></mat-spinner></div>
} @else {
  <table mat-table [dataSource]="secciones()" class="list-table">
    <ng-container matColumnDef="codigo">
      <th mat-header-cell *matHeaderCellDef>Código</th>
      <td mat-cell *matCellDef="let seccion">{{ seccion.codigo }}</td>
    </ng-container>

    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let seccion">{{ seccion.nombre }}</td>
    </ng-container>

    <ng-container matColumnDef="fecha_creacion">
      <th mat-header-cell *matHeaderCellDef>Fecha de creación</th>
      <td mat-cell *matCellDef="let seccion">{{ seccion.fecha_creacion | date: 'dd/MM/yyyy HH:mm' }}</td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let seccion">
        <button mat-icon-button (click)="abrirEditar(seccion)" matTooltip="Editar nombre">
          <mat-icon>edit</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columnas"></tr>
    <tr mat-row *matRowDef="let row; columns: columnas"></tr>
  </table>
}
